title: ER-Diagramm lesen und ergГӨnzen
difficulty: 3
question: |
  Betrachte das folgende ER-Diagramm fГјr ein Hotelreservierungssystem:

  ```
  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ      1:n     в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ     n:1    в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
  в”Ӯ   Gast    в”Ӯв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ӯ   Reservierung   в”Ӯв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ӯ   Zimmer  в”Ӯ
  в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө              в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө            в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө
  в”Ӯ GastID PK в”Ӯ              в”Ӯ ReservierungID PKв”Ӯ            в”Ӯ ZimmerNr  в”Ӯ
  в”Ӯ Name      в”Ӯ              в”Ӯ Anreise          в”Ӯ            в”Ӯ Typ       в”Ӯ
  в”Ӯ E-Mail    в”Ӯ              в”Ӯ Abreise          в”Ӯ            в”Ӯ Preis/Nachtв”Ӯ
  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ              в”Ӯ Gesamtbetrag     в”Ӯ            в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
                             в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
  ```

  **Aufgaben:**

  1. ErklГӨre in Worten, was dieses ER-Diagramm beschreibt.

  2. Kann ein Zimmer mehrere Reservierungen haben? BegrГјnde anhand des Diagramms.

  3. Ein Gast bucht gleichzeitig zwei Zimmer fГјr dasselbe Datum. Wie viele Reservierungs-DatensГӨtze entstehen?

  4. Das Hotel mГ¶chte auch **Mitarbeiter** erfassen, die Reservierungen anlegen. ErgГӨnze: Welche KardinalitГӨt hГӨtte die Beziehung zwischen вҖһMitarbeiter" und вҖһReservierung"? Welche Attribute brГӨuchte der EntitГӨtstyp Mitarbeiter mindestens?

  5. Was bedeutet вҖһPK" вҖ“ und was passiert, wenn zwei Reservierungen dieselbe ReservierungID hГӨtten?
tip: |
  1:n bedeutet: Eine Seite hat вҖһ1", die andere вҖһn" (viele). Schau, auf welcher Seite die 1 steht.
solution: |
  1. Das Diagramm beschreibt: GГӨste kГ¶nnen mehrere Reservierungen machen. Jede Reservierung gehГ¶rt zu genau einem Gast und genau einem Zimmer. Ein Zimmer kann mehrere Reservierungen haben (zu verschiedenen Zeiten).

  2. Ja. Die Beziehung Zimmer вҖ“ Reservierung ist n:1 (aus Zimmer-Sicht: Ein Zimmer hat mehrere Reservierungen). Ein Zimmer kann also zu verschiedenen ZeitrГӨumen mehrfach gebucht sein.

  3. **2 Reservierungs-DatensГӨtze** вҖ“ fГјr jedes Zimmer eine separate Reservierung.

  4. Mitarbeiter вҖ“ Reservierung: **1:n** (ein Mitarbeiter legt mehrere Reservierungen an; eine Reservierung wurde von genau einem Mitarbeiter angelegt). Attribute: MitarbeiterID (PK), Name, Rolle.

  5. PK = PrimГӨrschlГјssel. Wenn zwei Reservierungen dieselbe ID hГӨtten, wГӨre die Eindeutigkeit verletzt вҖ“ das Datenbanksystem wГјrde dies als Fehler abweisen.
